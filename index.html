<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SICOM - Simulador de Circuitos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: Arial; }

.node { padding: 12px; margin: 6px; border: 1px solid #ccc; cursor: pointer; border-radius: 10px; }
.node.active { border-color: #111; background: #f1f5f9; }
.node.energy { background: #e0f2fe; border-color: #0284c7; }
.error { color: red; }
</style>
</head>

<body class="p-6">

<h2 class="font-bold mb-4">Simulador de Workflow ⚡</h2>

<input type="file" id="jsonInput" accept=".json"><br><br>

<select id="processSelect">
<option value="">Carregue o JSON</option>
</select>

<div class="mt-4">
<label>Hierarquia:</label><br>
<label><input type="checkbox" class="level" value="operacional_0" checked> operacional_0</label>
<label><input type="checkbox" class="level" value="operacional_1" checked> operacional_1</label>
<label><input type="checkbox" class="level" value="tatico_0" checked> tatico_0</label>
<label><input type="checkbox" class="level" value="tatico_1" checked> tatico_1</label>
<label><input type="checkbox" class="level" value="estrategico_0" checked> estrategico_0</label>
<label><input type="checkbox" class="level" value="estrategico_1" checked> estrategico_1</label>
<label><input type="checkbox" class="level" value="estrategico_2" checked> estrategico_2</label>
</div>

<div id="errorDisplay" class="error mt-3"></div>

<div id="output" class="mt-4"></div>

<script>
const UI = {
    jsonInput: document.getElementById('jsonInput'),
    processSelect: document.getElementById('processSelect'),
    output: document.getElementById('output'),
    error: document.getElementById('errorDisplay')
};

let workflowData = null;

const HIERARQUIA = [
    'operacional_0','operacional_1','tatico_0','tatico_1',
    'estrategico_0','estrategico_1','estrategico_2'
];

function getHierarchyState() {
    const state = {};
    document.querySelectorAll('.level').forEach(el => {
        state[el.value] = el.checked;
    });
    return state;
}

const Engine = {

    mapToStatus(papel, acao) {
        if (papel === 'drh') return `DRH_${acao.toUpperCase()}`;
        return `${papel.toUpperCase()}_${acao.toUpperCase()}`;
    },

    resolverResponsavel(papel) {
        if (papel === 'drh') return 'drh';

        const state = getHierarchyState();
        const pos = HIERARQUIA.indexOf(papel);

        if (pos === -1) throw new Error(`Papel inválido: ${papel}`);

        for (let i = pos; i < HIERARQUIA.length; i++) {
            if (state[HIERARQUIA[i]]) return HIERARQUIA[i];
        }

        return null;
    },

    getNextStatus(processo, idx, depth = 0) {

        if (depth > 15) throw new Error("Loop detectado");

        const etapas = processo.etapas;
        const nextIdx = idx + 1;

        if (nextIdx >= etapas.length) return null;

        const etapa = etapas[nextIdx];
        const papel = etapa.papel;
        const acao = etapa.acao;

        if (papel !== 'drh') {
            const resp = this.resolverResponsavel(papel);
            if (!resp) throw new Error(`Sem responsável para ${papel}`);

            if (acao === 'da_ciencia') {
                const prox = etapas.slice(nextIdx + 1).find(e => e.acao === 'decide');
                if (prox && this.resolverResponsavel(prox.papel) === resp) {
                    return this.getNextStatus(processo, nextIdx, depth + 1);
                }
            }
        }

        return {
            idx: nextIdx,
            status: this.mapToStatus(papel, acao)
        };
    }
};

UI.jsonInput.onchange = (e) => {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = (ev) => {
        try {
            const raw = JSON.parse(ev.target.result);

            if (Array.isArray(raw)) {
                workflowData = raw;
            } else if (raw.processos && Array.isArray(raw.processos)) {
                workflowData = raw.processos;
            } else {
                throw new Error("JSON inválido");
            }

            UI.processSelect.innerHTML = '<option value="">Selecione</option>';

            workflowData.forEach(p => {
                if (!p.id) return;
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.processo || `Processo ${p.id}`;
                UI.processSelect.appendChild(opt);
            });

            UI.error.textContent = '';

        } catch (err) {
            workflowData = null;
            UI.error.textContent = err.message;
        }
    };

    reader.readAsText(file);
};

UI.processSelect.onchange = () => simular();
document.querySelectorAll('.level').forEach(el => el.onchange = simular);

function simular() {

    const id = UI.processSelect.value;
    if (!id || !workflowData) return;

    const proc = workflowData.find(p => String(p.id) === id);

    UI.output.innerHTML = '';

    let idx = -1;
    let safety = 0;
    let nodes = [];

    try {
        while (safety < 30) {
            const next = Engine.getNextStatus(proc, idx);

            if (!next) {
                nodes.push('FIM');
                break;
            }

            nodes.push(next.status);
            idx = next.idx;
            safety++;
        }

        renderNodes(nodes);

    } catch (err) {
        UI.error.textContent = err.message;
    }
}

function renderNodes(nodes) {

    UI.output.innerHTML = '';

    nodes.forEach((n, i) => {
        const div = document.createElement('div');
        div.className = 'node';
        div.textContent = n;
        UI.output.appendChild(div);
    });

    animateEnergy();
}

function animateEnergy() {
    const nodes = document.querySelectorAll('.node');
    let i = 0;

    function step() {
        nodes.forEach(n => n.classList.remove('energy'));
        if (nodes[i]) nodes[i].classList.add('energy');
        i++;
        if (i < nodes.length) setTimeout(step, 300);
    }

    step();
}

</script>

</body>
</html>
