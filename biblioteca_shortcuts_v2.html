<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICOM - Simulador de Circuitos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #1e293b; }
        input:checked + .slider:before { transform: translateX(20px); }

        .circuit-line::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 0;
            bottom: 0;
            width: 2px;
            border-left: 2px dashed #e2e8f0;
        }
        .node-active { border-color: #1e293b; background: #f8fafc; }
        .node-dot {
            position: absolute;
            left: -26px;
            top: 22px;
            width: 14px;
            height: 14px;
            background: #1e293b;
            border: 3px solid white;
            border-radius: 50%;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-12">

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- PAINEL DE CONTROLE (ESQUERDA) -->
        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-3 mb-6">
                    <i data-lucide="settings-2" class="text-slate-900"></i>
                    <h2 class="text-lg font-extrabold text-slate-900 uppercase tracking-tight">Mesa de Controle</h2>
                </div>

                <div class="mb-8">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Carregar Matriz JSON</label>
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i data-lucide="upload-cloud" class="text-slate-400 mb-2"></i>
                            <p class="text-xs text-slate-500">Clique para selecionar o arquivo</p>
                        </div>
                        <input type="file" id="jsonInput" class="hidden" accept=".json" />
                    </label>
                </div>

                <div class="space-y-4">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Interruptores de Hierarquia</label>
                    
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-700">Operacional 1 (Chefia)</span>
                        <label class="switch"><input type="checkbox" class="level-switch" data-level="operacional_1" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-700">Tático 0 (Gerência)</span>
                        <label class="switch"><input type="checkbox" class="level-switch" data-level="tatico_0" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-700">Tático 1 (Diretoria)</span>
                        <label class="switch"><input type="checkbox" class="level-switch" data-level="tatico_1" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-700">Estratégico 0 (Secretaria)</span>
                        <label class="switch"><input type="checkbox" class="level-switch" data-level="estrategico_0" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-700">Estratégico 1 (Presidência)</span>
                        <label class="switch"><input type="checkbox" class="level-switch" data-level="estrategico_1" checked><span class="slider"></span></label>
                    </div>
                </div>

                <div class="mt-8">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Selecionar Circuito</label>
                    <select id="processSelect" class="w-full p-3 rounded-xl border border-slate-200 bg-white text-sm font-bold text-slate-700 focus:ring-2 focus:ring-slate-900">
                        <option value="">Aguardando JSON...</option>
                    </select>
                </div>
            </div>

            <div id="errorDisplay" class="hidden bg-red-50 border border-red-100 p-6 rounded-3xl flex gap-4 items-start">
                <i data-lucide="shield-alert" class="text-red-600 shrink-0"></i>
                <div>
                    <h4 class="text-xs font-black text-red-900 uppercase">Erro de Contrato</h4>
                    <p id="errorMessage" class="text-xs text-red-700 mt-1 leading-relaxed"></p>
                </div>
            </div>
        </div>

        <!-- VISUALIZAÇÃO DO CIRCUITO (DIREITA) -->
        <div class="lg:col-span-7">
            <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-200 min-h-[600px]">
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-3">
                        <i data-lucide="route" class="text-slate-900"></i>
                        <h2 class="text-lg font-extrabold text-slate-900 uppercase tracking-tight">Circuito de Tramitação</h2>
                    </div>
                    <div id="statusBadge" class="text-[10px] font-black px-3 py-1 bg-slate-100 rounded-full text-slate-400 uppercase">Inativo</div>
                </div>

                <div id="circuitOutput" class="relative ml-6 space-y-6">
                    <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                        <i data-lucide="activity" size="48" class="mb-4 opacity-20"></i>
                        <p class="text-sm font-medium opacity-50">Carregue a matriz para visualizar o fluxo</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const UI = {
            jsonInput: document.getElementById('jsonInput'),
            processSelect: document.getElementById('processSelect'),
            switches: document.querySelectorAll('.level-switch'),
            circuitOutput: document.getElementById('circuitOutput'),
            errorDisplay: document.getElementById('errorDisplay'),
            errorMessage: document.getElementById('errorMessage'),
            statusBadge: document.getElementById('statusBadge')
        };

        let workflowData = null;
        const HIERARQUIA = ['operacional_1', 'tatico_0', 'tatico_1', 'estrategico_0', 'estrategico_1'];

        const Engine = {
            getSwitchesState() {
                const state = {};
                UI.switches.forEach(s => state[s.dataset.level] = s.checked);
                return state;
            },

            mapToStatus(papel, acao) {
                const map = {
                    drh: { valida: 'EM_TRIAGEM_DRH', registra: 'AGUARDANDO_REGISTRO_DRH' },
                    operacional_1: { da_ciencia: 'CIENCIA_CHEFIA_IMEDIATA', decide: 'AGUARDANDO_DECISAO_CHEFIA' },
                    tatico_0: { da_ciencia: 'CIENCIA_TATICO_0', decide: 'AGUARDANDO_DECISAO_TATICO_0' },
                    tatico_1: { da_ciencia: 'CIENCIA_TATICO_1', decide: 'AGUARDANDO_DECISAO_TATICO_1' },
                    estrategico_0: { da_ciencia: 'CIENCIA_ESTRATEGICO_0', decide: 'AGUARDANDO_DECISAO_ESTRATEGICO_0' },
                    estrategico_1: { da_ciencia: 'CIENCIA_ESTRATEGICO_1', decide: 'AGUARDANDO_DECISAO_ESTRATEGICO_1' }
                };
                return map[papel]?.[acao] || 'HOMOLOGADO_DRH';
            },

            resolverResponsavel(papelAlvo) {
                const state = this.getSwitchesState();
                const startPos = HIERARQUIA.indexOf(papelAlvo);
                if (startPos === -1) return null;

                for (let i = startPos; i < HIERARQUIA.length; i++) {
                    if (state[HIERARQUIA[i]]) return HIERARQUIA[i];
                }
                return null;
            },

            getNextStatus(processo, currentStatus) {
                const etapas = processo.etapas;
                let encontrouAtual = (currentStatus === 'SOLICITADO');

                for (let i = 0; i < etapas.length; i++) {
                    const etapa = etapas[i];
                    const statusComparacao = this.mapToStatus(etapa.papel, etapa.acao);

                    if (encontrouAtual) {
                        const papelAlvo = etapa.papel;
                        const acao = etapa.acao;

                        if (papelAlvo !== 'drh') {
                            const respAtual = this.resolverResponsavel(papelAlvo);
                            if (!respAtual) throw new Error(`Não há gestores ativos para assumir o nível '${papelAlvo}' ou superiores.`);

                            if (acao === 'da_ciencia') {
                                let proximaDecisao = null;
                                for (let j = i + 1; j < etapas.length; j++) {
                                    if (etapas[j].acao === 'decide') { proximaDecisao = etapas[j]; break; }
                                }
                                if (proximaDecisao) {
                                    const respDecisao = this.resolverResponsavel(proximaDecisao.papel);
                                    if (respDecisao === respAtual) continue; 
                                }
                            }
                        }
                        return statusComparacao;
                    }

                    if (statusComparacao === currentStatus) encontrouAtual = true;
                }
                return 'HOMOLOGADO_DRH';
            }
        };

        UI.jsonInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                workflowData = JSON.parse(ev.target.result);
                UI.processSelect.innerHTML = '<option value="">Selecione um processo...</option>';
                workflowData.processos.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id; opt.textContent = p.id;
                    UI.processSelect.appendChild(opt);
                });
                renderCircuit();
            };
            reader.readAsText(e.target.files[0]);
        };

        function renderCircuit(startFrom = 'SOLICITADO') {
            const procId = UI.processSelect.value;
            if (!workflowData || !procId) return;

            UI.circuitOutput.innerHTML = '';
            UI.errorDisplay.classList.add('hidden');
            UI.statusBadge.textContent = 'Ativo';
            UI.statusBadge.classList.replace('text-slate-400', 'text-green-600');

            const processo = workflowData.processos.find(p => p.id === procId);
            
            addNode('START', 'SOLICITADO', 'Ponto inicial de submissão.', startFrom === 'SOLICITADO');

            let current = 'SOLICITADO';
            let safety = 0;

            try {
                while (current !== 'HOMOLOGADO_DRH' && safety < 20) {
                    const next = Engine.getNextStatus(processo, current);
                    
                    // Identificar o papel responsável por este status para exibir no card
                    const etapaCorrespondente = processo.etapas.find(e => Engine.mapToStatus(e.papel, e.acao) === next);
                    const respFinal = etapaCorrespondente.papel === 'drh' ? 'DRH' : Engine.resolverResponsavel(etapaCorrespondente.papel);

                    addNode(
                        etapaCorrespondente.acao.toUpperCase(), 
                        next, 
                        `Responsável: ${respFinal.toUpperCase()}`, 
                        startFrom === next
                    );
                    
                    current = next;
                    safety++;
                }
            } catch (err) {
                UI.errorDisplay.classList.remove('hidden');
                UI.errorMessage.textContent = err.message;
            }

            lucide.createIcons();
        }

        function addNode(tag, title, desc, active) {
            const div = document.createElement('div');
            div.className = `circuit-line relative pl-8 pb-4 group`;
            div.onclick = () => renderCircuit(title);
            
            const isHomologado = title === 'HOMOLOGADO_DRH';
            const icon = isHomologado ? 'check-circle' : (active ? 'play-circle' : 'circle');

            div.innerHTML = `
                <div class="node-dot ${active ? 'bg-slate-900 scale-125' : (isHomologado ? 'bg-green-500' : 'bg-slate-200')}"></div>
                <div class="p-5 rounded-2xl border transition-all cursor-pointer hover:translate-x-2 ${active ? 'node-active ring-4 ring-slate-100 border-slate-900' : 'border-slate-100 bg-white'}">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[9px] font-black px-2 py-0.5 rounded bg-slate-100 text-slate-500 uppercase tracking-widest">${tag}</span>
                        <i data-lucide="${icon}" size="14" class="${active ? 'text-slate-900' : 'text-slate-300'}"></i>
                    </div>
                    <h3 class="text-xs font-extrabold text-slate-900">${title.replace(/_/g, ' ')}</h3>
                    <p class="text-[10px] text-slate-400 mt-1 font-medium">${desc}</p>
                </div>
            `;
            UI.circuitOutput.appendChild(div);
        }

        UI.processSelect.onchange = () => renderCircuit();
        UI.switches.forEach(s => s.onchange = () => renderCircuit());
        lucide.createIcons();
    </script>
</body>
</html>
